<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="960" height="380">
  <title>Why manual HED tagging stalls</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Why current HED workflows stall for MoBI labs</text>

  <!-- Step strip with four pain points -->
  <g>
    <!-- Step 1: read paper -->
    <g transform="translate(40, 70)">
      <rect x="0" y="0" width="200" height="230" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
      <!-- icon: book/paper -->
      <rect x="60" y="20" width="80" height="100" rx="4" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.4"/>
      <line x1="100" y1="20" x2="100" y2="120" stroke="#DC2626" stroke-width="1.2"/>
      <g stroke="#94A3B8" stroke-width="1">
        <line x1="68" y1="36" x2="92" y2="36"/>
        <line x1="68" y1="44" x2="92" y2="44"/>
        <line x1="68" y1="52" x2="92" y2="52"/>
        <line x1="68" y1="60" x2="86" y2="60"/>
        <line x1="108" y1="36" x2="132" y2="36"/>
        <line x1="108" y1="44" x2="132" y2="44"/>
        <line x1="108" y1="52" x2="132" y2="52"/>
        <line x1="108" y1="60" x2="126" y2="60"/>
      </g>
      <text x="100" y="148" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Read the paper</text>
      <text x="100" y="170" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">extract experiment</text>
      <text x="100" y="184" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">structure by hand</text>
      <text x="100" y="206" font-family="monospace" font-size="11" font-weight="bold" fill="#DC2626" text-anchor="middle">~hours per session</text>
    </g>

    <!-- arrow -->
    <path d="M242 185 L268 185" stroke="#475569" stroke-width="2"/>
    <polygon points="268,185 260,181 260,189" fill="#475569"/>

    <!-- Step 2: learn HED -->
    <g transform="translate(270, 70)">
      <rect x="0" y="0" width="200" height="230" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
      <!-- icon: tree -->
      <circle cx="100" cy="40" r="14" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.4"/>
      <line x1="100" y1="54" x2="100" y2="106" stroke="#DC2626" stroke-width="1.4"/>
      <circle cx="76" cy="76" r="9" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="100" y1="76" x2="78" y2="78" stroke="#DC2626" stroke-width="1"/>
      <circle cx="124" cy="76" r="9" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="100" y1="76" x2="122" y2="78" stroke="#DC2626" stroke-width="1"/>
      <circle cx="60" cy="106" r="7" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="76" y1="84" x2="62" y2="100" stroke="#DC2626" stroke-width="1"/>
      <circle cx="90" cy="106" r="7" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="76" y1="84" x2="88" y2="100" stroke="#DC2626" stroke-width="1"/>
      <circle cx="120" cy="106" r="7" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="124" y1="84" x2="120" y2="100" stroke="#DC2626" stroke-width="1"/>
      <circle cx="140" cy="106" r="7" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.2"/>
      <line x1="124" y1="84" x2="138" y2="100" stroke="#DC2626" stroke-width="1"/>
      <text x="100" y="148" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Learn the schema</text>
      <text x="100" y="170" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">~2000 tags, deep</text>
      <text x="100" y="184" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">hierarchy, value slots</text>
      <text x="100" y="206" font-family="monospace" font-size="11" font-weight="bold" fill="#DC2626" text-anchor="middle">expert-only</text>
    </g>

    <path d="M472 185 L498 185" stroke="#475569" stroke-width="2"/>
    <polygon points="498,185 490,181 490,189" fill="#475569"/>

    <!-- Step 3: write JSON -->
    <g transform="translate(500, 70)">
      <rect x="0" y="0" width="200" height="230" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
      <!-- icon: braces -->
      <text x="100" y="90" font-family="monospace" font-size="64" font-weight="bold" fill="#DC2626" text-anchor="middle">{ }</text>
      <text x="100" y="112" font-family="monospace" font-size="11" fill="#7F1D1D" text-anchor="middle">events.json</text>
      <text x="100" y="148" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Write the sidecar</text>
      <text x="100" y="170" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">column-level levels,</text>
      <text x="100" y="184" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">value slots, escapes</text>
      <text x="100" y="206" font-family="monospace" font-size="11" font-weight="bold" fill="#DC2626" text-anchor="middle">error-prone</text>
    </g>

    <path d="M702 185 L728 185" stroke="#475569" stroke-width="2"/>
    <polygon points="728,185 720,181 720,189" fill="#475569"/>

    <!-- Step 4: validate -->
    <g transform="translate(730, 70)">
      <rect x="0" y="0" width="200" height="230" rx="8" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.6"/>
      <!-- icon: validator -->
      <rect x="60" y="20" width="80" height="100" rx="4" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.4"/>
      <text x="100" y="60" font-family="monospace" font-size="22" font-weight="bold" fill="#DC2626" text-anchor="middle">!</text>
      <text x="100" y="86" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">3 errors</text>
      <text x="100" y="102" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">12 warnings</text>
      <text x="100" y="148" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Validate. Repeat.</text>
      <text x="100" y="170" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">JS validator,</text>
      <text x="100" y="184" font-family="monospace" font-size="10" fill="#7F1D1D" text-anchor="middle">cryptic messages</text>
      <text x="100" y="206" font-family="monospace" font-size="11" font-weight="bold" fill="#DC2626" text-anchor="middle">loop until clean</text>
    </g>
  </g>

  <!-- Bottom: "the result is that nobody does it" -->
  <g>
    <rect x="40" y="316" width="880" height="40" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="480" y="340" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">Net effect: HED adoption stays in the labs that build HED. Everyone else ships the thin events.tsv.</text>
  </g>
</svg>
