<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <title>Missing gait and balance annotations</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Gap #1 -- gait phases and balance-loss events are in the data, not in the sidecar</text>

  <!-- LEFT: gait cycle illustration -->
  <g>
    <rect x="40" y="60" width="430" height="320" rx="8" fill="#FFFFFF" stroke="#184A3D" stroke-width="1.6"/>
    <text x="255" y="84" font-family="sans-serif" font-size="14" font-weight="bold" fill="#184A3D" text-anchor="middle">Gait cycle phases (already in motion capture)</text>

    <!-- Walking figures showing phases -->
    <g transform="translate(60, 110)">
      <!-- heel strike right -->
      <g>
        <circle cx="20" cy="20" r="12" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.2"/>
        <rect x="14" y="32" width="12" height="36" fill="#E99852" stroke="#184A3D" stroke-width="1.2"/>
        <line x1="20" y1="68" x2="12" y2="98" stroke="#4B4967" stroke-width="3"/>
        <line x1="20" y1="68" x2="32" y2="92" stroke="#4B4967" stroke-width="3"/>
        <ellipse cx="32" cy="98" rx="8" ry="2.5" fill="#DC2626"/>
        <text x="20" y="120" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">R heel</text>
        <text x="20" y="132" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">strike</text>
      </g>
      <!-- loading response -->
      <g transform="translate(74, 0)">
        <circle cx="20" cy="20" r="12" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.2"/>
        <rect x="14" y="32" width="12" height="36" fill="#E99852" stroke="#184A3D" stroke-width="1.2"/>
        <line x1="20" y1="68" x2="16" y2="98" stroke="#4B4967" stroke-width="3"/>
        <line x1="20" y1="68" x2="26" y2="98" stroke="#4B4967" stroke-width="3"/>
        <ellipse cx="16" cy="98" rx="8" ry="2.5" fill="#4B4967"/>
        <ellipse cx="26" cy="98" rx="8" ry="2.5" fill="#4B4967"/>
        <text x="20" y="120" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">double</text>
        <text x="20" y="132" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">support</text>
      </g>
      <!-- midstance -->
      <g transform="translate(148, 0)">
        <circle cx="20" cy="20" r="12" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.2"/>
        <rect x="14" y="32" width="12" height="36" fill="#E99852" stroke="#184A3D" stroke-width="1.2"/>
        <line x1="20" y1="68" x2="20" y2="98" stroke="#4B4967" stroke-width="3"/>
        <line x1="20" y1="68" x2="34" y2="86" stroke="#4B4967" stroke-width="3"/>
        <ellipse cx="20" cy="98" rx="8" ry="2.5" fill="#4B4967"/>
        <text x="20" y="120" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">mid</text>
        <text x="20" y="132" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">stance</text>
      </g>
      <!-- swing -->
      <g transform="translate(222, 0)">
        <circle cx="20" cy="20" r="12" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.2"/>
        <rect x="14" y="32" width="12" height="36" fill="#E99852" stroke="#184A3D" stroke-width="1.2"/>
        <line x1="20" y1="68" x2="20" y2="98" stroke="#4B4967" stroke-width="3"/>
        <line x1="20" y1="68" x2="40" y2="78" stroke="#4B4967" stroke-width="3"/>
        <ellipse cx="20" cy="98" rx="8" ry="2.5" fill="#4B4967"/>
        <text x="20" y="120" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">L</text>
        <text x="20" y="132" font-family="monospace" font-size="9" fill="#1E293B" text-anchor="middle">swing</text>
      </g>
      <!-- balance loss -->
      <g transform="translate(296, 0)">
        <circle cx="20" cy="20" r="12" fill="#FBE7D2" stroke="#DC2626" stroke-width="1.6"/>
        <rect x="14" y="32" width="12" height="36" fill="#DC2626" opacity="0.7" stroke="#DC2626" stroke-width="1.2"/>
        <g transform="rotate(-22 20 50)">
          <line x1="20" y1="68" x2="4" y2="98" stroke="#DC2626" stroke-width="3"/>
          <line x1="20" y1="68" x2="36" y2="92" stroke="#DC2626" stroke-width="3"/>
          <ellipse cx="40" cy="98" rx="8" ry="2.5" fill="#DC2626"/>
        </g>
        <text x="20" y="124" font-family="monospace" font-size="9" font-weight="bold" fill="#991B1B" text-anchor="middle">balance</text>
        <text x="20" y="136" font-family="monospace" font-size="9" font-weight="bold" fill="#991B1B" text-anchor="middle">loss</text>
      </g>
    </g>

    <!-- Beam underline -->
    <rect x="56" y="248" width="396" height="6" fill="#E99852" stroke="#B45309" stroke-width="1.2"/>
    <text x="255" y="276" font-family="monospace" font-size="10" fill="#64748B" text-anchor="middle">beam: 2.5 x 12.7 cm; tandem stance keeps foot placement constrained</text>

    <!-- callout -->
    <rect x="60" y="292" width="392" height="76" rx="5" fill="#F0FDF4" stroke="#059669" stroke-width="1.4"/>
    <text x="256" y="312" font-family="sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">all of these are derivable</text>
    <text x="76" y="332" font-family="monospace" font-size="11" fill="#065F46">heel-strike timing from foot marker peaks</text>
    <text x="76" y="348" font-family="monospace" font-size="11" fill="#065F46">balance loss from beam-foot or harness load</text>
    <text x="76" y="364" font-family="monospace" font-size="11" fill="#065F46">recovery latency from CoM displacement</text>
  </g>

  <!-- RIGHT: what events.json currently has -->
  <g>
    <rect x="490" y="60" width="430" height="320" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="705" y="84" font-family="sans-serif" font-size="14" font-weight="bold" fill="#991B1B" text-anchor="middle">events.json today</text>

    <!-- JSON block -->
    <rect x="510" y="100" width="390" height="220" rx="4" fill="#FFFFFF" stroke="#DC2626" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#1E293B">
      <text x="524" y="120">{</text>
      <text x="540" y="136">"trial_type": {</text>
      <text x="556" y="152">"Description": "Type of event",</text>
      <text x="556" y="168">"Levels": {</text>
      <text x="572" y="184">"stimulus": "perturbation"</text>
      <text x="556" y="200">}</text>
      <text x="540" y="216">},</text>
      <text x="540" y="232">"value": {</text>
      <text x="556" y="248">"Levels": {</text>
      <text x="572" y="264">"pull_left": "...",</text>
      <text x="572" y="280">"pull_right": "...",</text>
      <text x="572" y="296">"rotate_cw / ccw": "..."</text>
      <text x="556" y="312">}</text>
    </g>

    <!-- missing label overlay -->
    <g transform="translate(510, 326)">
      <rect x="0" y="0" width="390" height="38" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
      <text x="195" y="16" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991B1B" text-anchor="middle">no gait_phase, no balance_loss, no recovery</text>
      <text x="195" y="30" font-family="monospace" font-size="10" fill="#991B1B" text-anchor="middle">re-users cannot epoch on these without redoing the analysis</text>
    </g>
  </g>

  <text x="480" y="406" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Phase-locking theta to heel-strike requires the heel-strike. It is one column, not a missing modality.</text>
</svg>
