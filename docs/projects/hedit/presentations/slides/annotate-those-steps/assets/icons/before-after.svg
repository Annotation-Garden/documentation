<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <title>Before/after HEDit on ds003739</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Before/after on ds003739 -- the same events.tsv, a different sidecar</text>

  <!-- LEFT: before -->
  <g>
    <rect x="30" y="56" width="440" height="400" rx="8" fill="#FEF2F2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="250" y="78" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">events.json shipped on NEMAR / OpenNeuro</text>

    <rect x="50" y="92" width="400" height="296" rx="4" fill="#FFFFFF" stroke="#DC2626" stroke-width="1"/>
    <g font-family="monospace" font-size="11" fill="#1E293B">
      <text x="66" y="112">{</text>
      <text x="82" y="128">"onset": {</text>
      <text x="98" y="144">"Description": "Event onset",</text>
      <text x="98" y="160">"Units": "second"</text>
      <text x="82" y="176">},</text>
      <text x="82" y="192">"trial_type": {</text>
      <text x="98" y="208">"Description": "Type of event",</text>
      <text x="98" y="224">"Levels": {</text>
      <text x="114" y="240">"stimulus": "Sensorimotor</text>
      <text x="114" y="256">  perturbation stimulus"</text>
      <text x="98" y="272">}</text>
      <text x="82" y="288">},</text>
      <text x="82" y="304">"value": {</text>
      <text x="98" y="320">"Levels": {</text>
      <text x="114" y="336">"pull_left": "Onset of pull...",</text>
      <text x="114" y="352">"pull_right": "...",</text>
      <text x="114" y="368">"rotate_cw": "..."</text>
      <text x="98" y="384">}</text>
    </g>

    <text x="250" y="412" font-family="sans-serif" font-size="11" fill="#991B1B" text-anchor="middle">Human-readable. Not machine-queryable.</text>
    <text x="250" y="428" font-family="monospace" font-size="10" fill="#991B1B" text-anchor="middle">4 string labels  -  no force, angle, phase, condition</text>
    <text x="250" y="444" font-family="monospace" font-size="10" fill="#991B1B" text-anchor="middle">re-users re-engineer from scratch</text>
  </g>

  <!-- center arrow -->
  <g>
    <path d="M480 250 L500 250" stroke="#E99852" stroke-width="3"/>
    <polygon points="500,250 492,244 492,256" fill="#E99852"/>
    <text x="490" y="234" font-family="monospace" font-size="10" font-weight="bold" fill="#B45309" text-anchor="middle">HEDit</text>
    <text x="490" y="272" font-family="monospace" font-size="9" fill="#B45309" text-anchor="middle">3 min</text>
  </g>

  <!-- RIGHT: after -->
  <g>
    <rect x="510" y="56" width="440" height="400" rx="8" fill="#F0FDF4" stroke="#059669" stroke-width="1.6"/>
    <text x="730" y="78" font-family="sans-serif" font-size="13" font-weight="bold" fill="#065F46" text-anchor="middle">events.json after HEDit</text>

    <rect x="530" y="92" width="400" height="346" rx="4" fill="#FFFFFF" stroke="#059669" stroke-width="1"/>
    <g font-family="monospace" font-size="10" fill="#1E293B">
      <text x="546" y="110">{</text>
      <text x="558" y="124">"onset": { "HED": "Onset" },</text>
      <text x="558" y="140">"duration": { "HED": "Duration/# s" },</text>
      <text x="558" y="156">"trial_type": {</text>
      <text x="572" y="172">"HED": {</text>
      <text x="586" y="188" fill="#065F46">"stimulus": "Sensory-event,</text>
      <text x="610" y="202" fill="#065F46">Experimental-stimulus, Perturbation"</text>
      <text x="572" y="216">}</text>
      <text x="558" y="230">},</text>
      <text x="558" y="244">"value": {</text>
      <text x="572" y="260">"HED": {</text>
      <text x="586" y="276" fill="#065F46">"pull_left": "Move, Push/</text>
      <text x="610" y="290" fill="#065F46">(Direction/Leftward, Body-part/Hip),</text>
      <text x="610" y="304" fill="#065F46">(Force, N, #), Mechanical-pull",</text>
      <text x="586" y="320" fill="#065F46">"pull_right": "Move, Push/</text>
      <text x="610" y="334" fill="#065F46">(Direction/Rightward, Body-part/Hip),</text>
      <text x="610" y="348" fill="#065F46">(Force, N, #), Mechanical-pull",</text>
      <text x="586" y="364" fill="#065F46">"rotate_cw": "Visual-presentation,</text>
      <text x="610" y="378" fill="#065F46">Rotation/(Direction/Clockwise),</text>
      <text x="610" y="392" fill="#065F46">(Magnitude, deg, #), Visual-perturbation",</text>
      <text x="586" y="408" fill="#065F46">"rotate_ccw": "..."</text>
      <text x="572" y="424">}</text>
    </g>
  </g>

  <text x="480" y="472" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Same dataset. Now searchable, comparable, and ready for downstream MoBI analyses without paper archaeology.</text>
</svg>
