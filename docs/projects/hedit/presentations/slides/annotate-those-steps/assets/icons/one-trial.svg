<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="960" height="380">
  <title>Anatomy of one perturbation trial</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">One trial = stand-or-walk + perturbation + recovery. Only 1 of these survives.</text>

  <!-- Timeline base -->
  <line x1="60" y1="220" x2="900" y2="220" stroke="#1E293B" stroke-width="2"/>
  <polygon points="900,220 890,214 890,226" fill="#1E293B"/>

  <!-- Time ticks -->
  <g font-family="monospace" font-size="10" fill="#64748B" text-anchor="middle">
    <line x1="60" y1="216" x2="60" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="60" y="240">t-2.0</text>
    <line x1="220" y1="216" x2="220" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="220" y="240">t-0.5</text>
    <line x1="320" y1="216" x2="320" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="320" y="240">t = 0</text>
    <line x1="420" y1="216" x2="420" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="420" y="240">+0.5</text>
    <line x1="520" y1="216" x2="520" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="520" y="240">+1.0</text>
    <line x1="700" y1="216" x2="700" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="700" y="240">+2.5</text>
    <line x1="860" y1="216" x2="860" y2="224" stroke="#64748B" stroke-width="1"/>
    <text x="860" y="240">+4.0 s</text>
  </g>

  <!-- Phase bars stacked vertically -->
  <!-- Baseline (pre-perturbation) -->
  <g>
    <rect x="60" y="64" width="260" height="22" rx="3" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.4"/>
    <text x="190" y="80" font-family="sans-serif" font-size="11" font-weight="bold" fill="#1E40AF" text-anchor="middle">Baseline locomotion: walk @ 0.22 m/s on beam</text>
  </g>

  <!-- Perturbation event -->
  <g>
    <rect x="320" y="64" width="200" height="22" rx="3" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="420" y="80" font-family="sans-serif" font-size="10" font-weight="bold" fill="#991B1B" text-anchor="middle">Perturbation: pull (1 s) or rotate (0.5 s)</text>
  </g>

  <!-- Recovery -->
  <g>
    <rect x="520" y="64" width="380" height="22" rx="3" fill="#D1FAE5" stroke="#059669" stroke-width="1.4"/>
    <text x="710" y="80" font-family="sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">Postural recovery + ongoing gait</text>
  </g>

  <!-- Gait cycle phases (annotated below the top bars) -->
  <g>
    <text x="60" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4B4967">Gait phase</text>
    <!-- alternating heel-strike / swing bars -->
    <rect x="60" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="100" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="140" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="180" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="220" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="260" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="300" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="340" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="380" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="420" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="460" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="500" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="540" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="580" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="620" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="660" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="700" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="740" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="780" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <rect x="820" y="118" width="40" height="14" fill="#4B4967" opacity="0.8"/>
    <rect x="860" y="118" width="40" height="14" fill="#4B4967" opacity="0.4"/>
    <text x="888" y="146" font-family="monospace" font-size="9" fill="#4B4967" text-anchor="end">L / R steps</text>
  </g>

  <!-- Force profile -->
  <g>
    <text x="60" y="156" font-family="sans-serif" font-size="11" font-weight="bold" fill="#DC2626">Pull force (N)</text>
    <path d="M60 200 L319 200 L325 174 L355 152 L420 152 L455 174 L520 200 L900 200" fill="none" stroke="#DC2626" stroke-width="1.8"/>
    <path d="M60 200 L319 200 L325 174 L355 152 L420 152 L455 174 L520 200 L900 200 L900 208 L60 208 Z" fill="#DC2626" opacity="0.12"/>
  </g>

  <!-- ANNOTATIONS: what the events.tsv captures vs what is real -->
  <!-- captured (only the t=0 spike) -->
  <g>
    <line x1="320" y1="220" x2="320" y2="290" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="4,3"/>
    <circle cx="320" cy="220" r="5" fill="#DC2626"/>
    <rect x="240" y="290" width="160" height="36" rx="4" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.4"/>
    <text x="320" y="306" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991B1B" text-anchor="middle">events.tsv captures</text>
    <text x="320" y="320" font-family="monospace" font-size="10" fill="#991B1B" text-anchor="middle">onset + label</text>
  </g>

  <!-- missing context -->
  <g>
    <rect x="430" y="290" width="470" height="64" rx="4" fill="#FFFBEB" stroke="#B45309" stroke-width="1.4"/>
    <text x="445" y="306" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7C2D12">also true (and recoverable from the data), but NOT in events.tsv:</text>
    <text x="445" y="322" font-family="monospace" font-size="10" fill="#7C2D12">gait phase at perturbation onset  -  peak force (N)  -  rotation angle / speed</text>
    <text x="445" y="336" font-family="monospace" font-size="10" fill="#7C2D12">balance-loss flag  -  recovery latency  -  task (stand/walk)  -  perturbation direction</text>
  </g>

  <text x="480" y="372" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">The thin column is a triage decision, not a data limitation. Most context is already recorded.</text>
</svg>
