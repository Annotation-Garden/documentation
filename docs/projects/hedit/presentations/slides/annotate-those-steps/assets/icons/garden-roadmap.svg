<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <title>Annotation Garden roadmap</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Where this fits -- HEDit lives inside the Annotation Garden Initiative</text>

  <!-- Three-tier stack -->
  <!-- Tier 1: HEDit (foundation) -->
  <g>
    <rect x="60" y="80" width="840" height="80" rx="10" fill="#FFFBF5" stroke="#E99852" stroke-width="2"/>
    <text x="80" y="108" font-family="sans-serif" font-size="14" font-weight="bold" fill="#B45309">HEDit (today, v0.6)</text>
    <text x="80" y="130" font-family="sans-serif" font-size="11" fill="#1E293B">natural-language -&gt; HED tag converter, LangGraph multi-agent, validator-in-the-loop</text>
    <text x="80" y="148" font-family="monospace" font-size="11" fill="#7C2D12">CLI + JSON, BIDS-compliant, OpenRouter-backed</text>
    <!-- status badge -->
    <rect x="760" y="92" width="130" height="62" rx="6" fill="#FEF3C7" stroke="#B45309" stroke-width="1.4"/>
    <text x="825" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="#7C2D12" text-anchor="middle">shipping</text>
    <line x1="772" y1="118" x2="878" y2="118" stroke="#B45309" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="825" y="132" font-family="monospace" font-size="9" fill="#7C2D12" text-anchor="middle">api.annotation</text>
    <text x="825" y="145" font-family="monospace" font-size="9" fill="#7C2D12" text-anchor="middle">.garden/hedit</text>
  </g>

  <!-- Tier 2: hedify (planned) -->
  <g>
    <rect x="60" y="172" width="840" height="80" rx="10" fill="#F8FAFC" stroke="#4B4967" stroke-width="2" stroke-dasharray="6,4"/>
    <text x="80" y="200" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4B4967">hedify (planned)</text>
    <text x="80" y="222" font-family="sans-serif" font-size="11" fill="#1E293B">GUI annotation studio with paper PDF reader, drag-and-drop tags, reviewer audit trail</text>
    <text x="80" y="240" font-family="monospace" font-size="11" fill="#4B4967">extends HEDit; closes the human-in-the-loop step</text>
    <rect x="760" y="184" width="130" height="62" rx="6" fill="#EDE9FE" stroke="#4B4967" stroke-width="1.4"/>
    <text x="825" y="202" font-family="sans-serif" font-size="11" font-weight="bold" fill="#4B4967" text-anchor="middle">design</text>
    <line x1="772" y1="210" x2="878" y2="210" stroke="#4B4967" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="825" y="224" font-family="monospace" font-size="9" fill="#4B4967" text-anchor="middle">2026 Q4</text>
    <text x="825" y="237" font-family="monospace" font-size="9" fill="#4B4967" text-anchor="middle">target</text>
  </g>

  <!-- Tier 3: Annotation Garden (ecosystem) -->
  <g>
    <rect x="60" y="264" width="840" height="100" rx="10" fill="#F0FDF4" stroke="#184A3D" stroke-width="2"/>
    <text x="80" y="292" font-family="sans-serif" font-size="14" font-weight="bold" fill="#184A3D">Annotation Garden Initiative (AGI)</text>
    <text x="80" y="314" font-family="sans-serif" font-size="11" fill="#1E293B">open infrastructure for collaborative annotation of naturalistic neuroscience stimuli</text>
    <text x="80" y="332" font-family="monospace" font-size="11" fill="#065F46">Stim-BIDS (BEP044) + HED + GitHub-versioned annotations</text>

    <!-- mini badges across bottom -->
    <g transform="translate(80, 342)">
      <rect x="0" y="0" width="116" height="18" rx="3" fill="#FFFFFF" stroke="#184A3D" stroke-width="1"/>
      <text x="58" y="13" font-family="monospace" font-size="9" fill="#184A3D" text-anchor="middle">image-annotation</text>
      <rect x="124" y="0" width="100" height="18" rx="3" fill="#FFFFFF" stroke="#184A3D" stroke-width="1"/>
      <text x="174" y="13" font-family="monospace" font-size="9" fill="#184A3D" text-anchor="middle">HEDit / hedify</text>
      <rect x="232" y="0" width="120" height="18" rx="3" fill="#FFFFFF" stroke="#184A3D" stroke-width="1"/>
      <text x="292" y="13" font-family="monospace" font-size="9" fill="#184A3D" text-anchor="middle">flagship datasets</text>
      <rect x="360" y="0" width="116" height="18" rx="3" fill="#FFFFFF" stroke="#184A3D" stroke-width="1"/>
      <text x="418" y="13" font-family="monospace" font-size="9" fill="#184A3D" text-anchor="middle">curation governance</text>
    </g>

    <rect x="760" y="276" width="130" height="62" rx="6" fill="#D1FAE5" stroke="#184A3D" stroke-width="1.4"/>
    <text x="825" y="294" font-family="sans-serif" font-size="11" font-weight="bold" fill="#065F46" text-anchor="middle">launching</text>
    <line x1="772" y1="302" x2="878" y2="302" stroke="#184A3D" stroke-width="0.6" stroke-dasharray="2,2"/>
    <text x="825" y="316" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle">annotation</text>
    <text x="825" y="329" font-family="monospace" font-size="9" fill="#065F46" text-anchor="middle">.garden</text>
  </g>

  <text x="480" y="396" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">The journey: write descriptions today, get audited GUI tomorrow, share validated annotations with the field.</text>
</svg>
