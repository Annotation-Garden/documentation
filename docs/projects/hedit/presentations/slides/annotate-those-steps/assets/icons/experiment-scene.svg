<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" width="960" height="480">
  <title>Peterson and Ferris 2018 experimental setup</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Beam walking / standing with mediolateral pull and visual rotation perturbations</text>

  <!-- LEFT PANEL: PULL condition -->
  <g>
    <rect x="20" y="48" width="450" height="380" rx="8" fill="#FFFBF5" stroke="#E99852" stroke-width="1.6"/>
    <text x="245" y="68" font-family="sans-serif" font-size="14" font-weight="bold" fill="#B45309" text-anchor="middle">Pull perturbation (1.0 s)</text>

    <!-- harness ceiling anchor -->
    <line x1="245" y1="86" x2="245" y2="116" stroke="#1E293B" stroke-width="2"/>
    <rect x="225" y="80" width="40" height="8" rx="2" fill="#1E293B"/>

    <!-- subject (simplified) -->
    <g transform="translate(220, 116)">
      <!-- head -->
      <circle cx="25" cy="20" r="18" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.6"/>
      <!-- EEG cap -->
      <path d="M7 20 Q25 -4 43 20" fill="none" stroke="#184A3D" stroke-width="2.4"/>
      <g fill="#184A3D">
        <circle cx="15" cy="10" r="1.6"/><circle cx="25" cy="6" r="1.6"/><circle cx="35" cy="10" r="1.6"/>
        <circle cx="12" cy="20" r="1.6"/><circle cx="25" cy="14" r="1.6"/><circle cx="38" cy="20" r="1.6"/>
      </g>
      <!-- torso -->
      <path d="M10 42 L40 42 L44 130 L6 130 Z" fill="#E99852" opacity="0.8" stroke="#184A3D" stroke-width="1.6"/>
      <!-- harness loops -->
      <path d="M10 42 L25 96 L40 42" fill="none" stroke="#4B4967" stroke-width="2"/>
      <rect x="20" y="92" width="10" height="7" fill="#4B4967"/>
      <!-- cable up -->
      <line x1="25" y1="42" x2="25" y2="0" stroke="#1E293B" stroke-width="1.6"/>
      <!-- arms crossed across chest -->
      <path d="M10 60 Q25 80 40 60" fill="none" stroke="#184A3D" stroke-width="3"/>
      <!-- legs (tandem) -->
      <rect x="14" y="130" width="10" height="62" rx="2" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
      <rect x="28" y="130" width="10" height="62" rx="2" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
      <!-- shoes (heel-to-toe) -->
      <ellipse cx="19" cy="196" rx="10" ry="3" fill="#1E293B"/>
      <ellipse cx="33" cy="196" rx="10" ry="3" fill="#1E293B"/>
    </g>

    <!-- WAIST PULL CABLE going right out of frame -->
    <line x1="265" y1="190" x2="380" y2="190" stroke="#1E293B" stroke-width="2.2"/>
    <!-- pulley wheel -->
    <circle cx="390" cy="190" r="10" fill="#FFFFFF" stroke="#1E293B" stroke-width="2"/>
    <circle cx="390" cy="190" r="2.5" fill="#1E293B"/>
    <!-- motor box -->
    <rect x="386" y="200" width="32" height="42" rx="3" fill="#4B4967" stroke="#1E293B" stroke-width="1.6"/>
    <text x="402" y="226" font-family="monospace" font-size="9" fill="#FFFFFF" text-anchor="middle">MOTOR</text>
    <text x="402" y="237" font-family="monospace" font-size="8" fill="#E99852" text-anchor="middle">load cell</text>

    <!-- force arrow (mediolateral pull) -->
    <path d="M250 190 L210 190" fill="none" stroke="#DC2626" stroke-width="3.2" stroke-linecap="round"/>
    <polygon points="206,190 218,184 218,196" fill="#DC2626"/>
    <text x="220" y="180" font-family="sans-serif" font-size="11" font-weight="bold" fill="#991B1B">F_pull</text>

    <!-- treadmill -->
    <rect x="120" y="330" width="250" height="20" rx="3" fill="#94A3B8" stroke="#1E293B" stroke-width="1.6"/>
    <!-- beam on treadmill -->
    <rect x="180" y="318" width="130" height="12" fill="#E99852" stroke="#B45309" stroke-width="1.4"/>
    <!-- treadmill rollers -->
    <circle cx="128" cy="340" r="8" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.6"/>
    <circle cx="362" cy="340" r="8" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.6"/>
    <!-- speed label -->
    <text x="245" y="370" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">0.22 m/s walk -or- stand on beam (2.5 x 12.7 cm)</text>

    <!-- waist marker on torso for clarity -->
    <rect x="240" y="207" width="10" height="6" fill="#DC2626"/>

    <text x="245" y="402" font-family="sans-serif" font-size="11" fill="#7C2D12" text-anchor="middle">Two electromechanical motors, predefined pseudo-random sequence,</text>
    <text x="245" y="416" font-family="sans-serif" font-size="11" fill="#7C2D12" text-anchor="middle">75 left + 75 right per 10-min trial.</text>
  </g>

  <!-- RIGHT PANEL: VR rotation condition -->
  <g>
    <rect x="490" y="48" width="450" height="380" rx="8" fill="#F0F4FF" stroke="#4B4967" stroke-width="1.6"/>
    <text x="715" y="68" font-family="sans-serif" font-size="14" font-weight="bold" fill="#4B4967" text-anchor="middle">Visual field rotation (0.5 s)</text>

    <!-- ceiling anchor -->
    <line x1="715" y1="86" x2="715" y2="116" stroke="#1E293B" stroke-width="2"/>
    <rect x="695" y="80" width="40" height="8" rx="2" fill="#1E293B"/>

    <!-- subject -->
    <g transform="translate(690, 116)">
      <circle cx="25" cy="20" r="18" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.6"/>
      <!-- VR headset over eyes -->
      <rect x="6" y="14" width="38" height="14" rx="3" fill="#1E293B" stroke="#184A3D" stroke-width="1.4"/>
      <rect x="10" y="17" width="10" height="8" fill="#4B4967"/>
      <rect x="30" y="17" width="10" height="8" fill="#4B4967"/>
      <!-- EEG cap dots above headset -->
      <g fill="#184A3D">
        <circle cx="14" cy="8" r="1.6"/><circle cx="25" cy="4" r="1.6"/><circle cx="36" cy="8" r="1.6"/>
      </g>
      <path d="M7 14 Q25 -8 43 14" fill="none" stroke="#184A3D" stroke-width="2"/>
      <!-- torso -->
      <path d="M10 42 L40 42 L44 130 L6 130 Z" fill="#4B4967" opacity="0.75" stroke="#184A3D" stroke-width="1.6"/>
      <path d="M10 42 L25 96 L40 42" fill="none" stroke="#E99852" stroke-width="2"/>
      <rect x="20" y="92" width="10" height="7" fill="#E99852"/>
      <line x1="25" y1="42" x2="25" y2="0" stroke="#1E293B" stroke-width="1.6"/>
      <!-- arms crossed -->
      <path d="M10 60 Q25 80 40 60" fill="none" stroke="#184A3D" stroke-width="3"/>
      <!-- legs -->
      <rect x="14" y="130" width="10" height="62" rx="2" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
      <rect x="28" y="130" width="10" height="62" rx="2" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
      <ellipse cx="19" cy="196" rx="10" ry="3" fill="#1E293B"/>
      <ellipse cx="33" cy="196" rx="10" ry="3" fill="#1E293B"/>
    </g>

    <!-- VR view panel showing rotating room -->
    <g transform="translate(530, 150)">
      <rect x="0" y="0" width="120" height="80" rx="4" fill="#FFFFFF" stroke="#4B4967" stroke-width="1.6"/>
      <!-- rotated room interior (tilted lines) -->
      <g transform="rotate(-12 60 40)">
        <line x1="0" y1="20" x2="120" y2="20" stroke="#94A3B8" stroke-width="1.4"/>
        <line x1="0" y1="60" x2="120" y2="60" stroke="#94A3B8" stroke-width="1.4"/>
        <line x1="30" y1="0" x2="30" y2="80" stroke="#94A3B8" stroke-width="1.4"/>
        <line x1="90" y1="0" x2="90" y2="80" stroke="#94A3B8" stroke-width="1.4"/>
      </g>
      <!-- rotation arrow -->
      <path d="M28 16 A 38 38 0 0 0 92 16" fill="none" stroke="#DC2626" stroke-width="2.4"/>
      <polygon points="92,16 84,10 84,22" fill="#DC2626"/>
      <text x="60" y="78" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">20 deg CW / CCW</text>
    </g>

    <!-- arrow from VR display to headset -->
    <path d="M650 190 L680 134" fill="none" stroke="#4B4967" stroke-width="1.6" stroke-dasharray="4,3"/>
    <polygon points="680,134 670,138 678,144" fill="#4B4967"/>

    <!-- treadmill -->
    <rect x="590" y="330" width="250" height="20" rx="3" fill="#94A3B8" stroke="#1E293B" stroke-width="1.6"/>
    <rect x="650" y="318" width="130" height="12" fill="#E99852" stroke="#B45309" stroke-width="1.4"/>
    <circle cx="598" cy="340" r="8" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.6"/>
    <circle cx="832" cy="340" r="8" fill="#FFFFFF" stroke="#1E293B" stroke-width="1.6"/>
    <text x="715" y="370" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">same beam, same speeds; visual field rotates instead</text>

    <text x="715" y="402" font-family="sans-serif" font-size="11" fill="#3B3559" text-anchor="middle">Oculus Rift DK2, view of a webcam mounted to the headset,</text>
    <text x="715" y="416" font-family="sans-serif" font-size="11" fill="#3B3559" text-anchor="middle">digitally rotated 20 deg for 0.5 s per perturbation.</text>
  </g>

  <text x="480" y="462" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">4 sessions per subject (stand pull, walk pull, stand rotate, walk rotate) x 150 perturbations each.</text>
</svg>
