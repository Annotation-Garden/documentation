<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" width="960" height="420">
  <title>MoBI multimodal data stack</title>
  <text x="480" y="26" font-family="sans-serif" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">Mobile Brain/Body Imaging (MoBI) = many streams, one experiment</text>

  <!-- Subject silhouette in the center -->
  <g transform="translate(440, 60)">
    <!-- head -->
    <circle cx="40" cy="36" r="22" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.6"/>
    <!-- EEG cap dots -->
    <g fill="#184A3D">
      <circle cx="28" cy="22" r="1.8"/><circle cx="40" cy="18" r="1.8"/><circle cx="52" cy="22" r="1.8"/>
      <circle cx="24" cy="32" r="1.8"/><circle cx="40" cy="28" r="1.8"/><circle cx="56" cy="32" r="1.8"/>
      <circle cx="28" cy="42" r="1.8"/><circle cx="40" cy="38" r="1.8"/><circle cx="52" cy="42" r="1.8"/>
    </g>
    <!-- cap band -->
    <path d="M16 36 Q40 6 64 36" fill="none" stroke="#184A3D" stroke-width="2"/>
    <!-- neck -->
    <rect x="36" y="56" width="8" height="8" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.4"/>
    <!-- torso -->
    <path d="M22 66 L58 66 L62 152 L18 152 Z" fill="#E99852" opacity="0.85" stroke="#184A3D" stroke-width="1.6"/>
    <!-- harness straps -->
    <path d="M22 66 L40 110 L58 66" fill="none" stroke="#4B4967" stroke-width="2"/>
    <rect x="34" y="106" width="12" height="8" fill="#4B4967"/>
    <!-- arms -->
    <rect x="6" y="68" width="12" height="64" rx="4" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.4"/>
    <rect x="62" y="68" width="12" height="64" rx="4" fill="#FBE7D2" stroke="#184A3D" stroke-width="1.4"/>
    <!-- legs -->
    <rect x="22" y="152" width="14" height="80" rx="3" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
    <rect x="44" y="152" width="14" height="80" rx="3" fill="#4B4967" stroke="#184A3D" stroke-width="1.4"/>
    <!-- shoes -->
    <ellipse cx="29" cy="238" rx="9" ry="3.5" fill="#1E293B"/>
    <ellipse cx="51" cy="238" rx="9" ry="3.5" fill="#1E293B"/>
  </g>

  <!-- Modality cards radiating around the subject -->
  <!-- top-left: EEG -->
  <g>
    <rect x="40" y="64" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#184A3D" stroke-width="1.6"/>
    <text x="56" y="84" font-family="sans-serif" font-size="13" font-weight="bold" fill="#184A3D">EEG (128-ch)</text>
    <text x="56" y="100" font-family="monospace" font-size="11" fill="#475569">512 Hz scalp</text>
    <text x="56" y="114" font-family="monospace" font-size="11" fill="#475569">cortical dynamics</text>
    <path d="M210 94 L300 110" stroke="#184A3D" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- mid-left: EMG -->
  <g>
    <rect x="40" y="148" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#184A3D" stroke-width="1.6"/>
    <text x="56" y="168" font-family="sans-serif" font-size="13" font-weight="bold" fill="#184A3D">EMG (leg + neck)</text>
    <text x="56" y="184" font-family="monospace" font-size="11" fill="#475569">1000 Hz</text>
    <text x="56" y="198" font-family="monospace" font-size="11" fill="#475569">muscle activation</text>
    <path d="M210 178 L300 178" stroke="#184A3D" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- bottom-left: Motion capture -->
  <g>
    <rect x="40" y="232" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#184A3D" stroke-width="1.6"/>
    <text x="56" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#184A3D">Motion capture</text>
    <text x="56" y="268" font-family="monospace" font-size="11" fill="#475569">16 markers</text>
    <text x="56" y="282" font-family="monospace" font-size="11" fill="#475569">kinematics, sway</text>
    <path d="M210 262 L300 240" stroke="#184A3D" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- top-right: VR / display -->
  <g>
    <rect x="750" y="64" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#E99852" stroke-width="1.6"/>
    <text x="766" y="84" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B45309">VR / visual stim</text>
    <text x="766" y="100" font-family="monospace" font-size="11" fill="#475569">Oculus Rift DK2</text>
    <text x="766" y="114" font-family="monospace" font-size="11" fill="#475569">field rotation 20deg</text>
    <path d="M750 94 L660 110" stroke="#E99852" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- mid-right: Force / load cell -->
  <g>
    <rect x="750" y="148" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#E99852" stroke-width="1.6"/>
    <text x="766" y="168" font-family="sans-serif" font-size="13" font-weight="bold" fill="#B45309">Load cell + motor</text>
    <text x="766" y="184" font-family="monospace" font-size="11" fill="#475569">mediolateral pull</text>
    <text x="766" y="198" font-family="monospace" font-size="11" fill="#475569">peak force (N)</text>
    <path d="M750 178 L660 178" stroke="#E99852" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- bottom-right: Behavior / task -->
  <g>
    <rect x="750" y="232" width="170" height="60" rx="8" fill="#FFFFFF" stroke="#4B4967" stroke-width="1.6"/>
    <text x="766" y="252" font-family="sans-serif" font-size="13" font-weight="bold" fill="#4B4967">Task / behavior</text>
    <text x="766" y="268" font-family="monospace" font-size="11" fill="#475569">walk vs stand</text>
    <text x="766" y="282" font-family="monospace" font-size="11" fill="#475569">balance state</text>
    <path d="M750 262 L660 240" stroke="#4B4967" stroke-width="1.4" stroke-dasharray="3,3"/>
  </g>

  <!-- Bottom panel: the single thin events.tsv -->
  <g>
    <rect x="120" y="332" width="720" height="60" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.6"/>
    <text x="480" y="354" font-family="sans-serif" font-size="13" font-weight="bold" fill="#991B1B" text-anchor="middle">but what reaches the shared archive?</text>
    <text x="480" y="376" font-family="monospace" font-size="11" fill="#991B1B" text-anchor="middle">events.tsv :  onset  |  duration  |  trial_type  |  value (pull_left, pull_right, rotate_cw, rotate_ccw)</text>
  </g>

  <text x="480" y="410" font-family="sans-serif" font-size="11" fill="#64748B" font-style="italic" text-anchor="middle">Six modalities collected. One column of labels survives the journey to re-users.</text>
</svg>
